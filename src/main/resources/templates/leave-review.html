<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leave Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-page">
<main class="auth-card auth-card-wide">
    <h1 class="h3 mb-3">Leave Review</h1>
    <div th:replace="~{fragments/messages :: flash}"></div>
    <p class="text-muted" th:text="${booking.property.title}">Property</p>
    <form th:action="@{/booking/{id}/review(id=${booking.id})}" method="post">
        <div class="mb-3">
            <label class="form-label" for="rating">Rating</label>
            <select class="form-select" id="rating" name="rating" required>
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Good</option>
                <option value="3">3 - Average</option>
                <option value="2">2 - Poor</option>
                <option value="1">1 - Bad</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label" for="comment">Comment</label>
            <textarea class="form-control" id="comment" name="comment" rows="4" required></textarea>
        </div>
        <button class="btn btn-primary w-100" type="submit">Submit Review</button>
    </form>
    <a class="d-inline-block mt-3" th:href="@{/my-bookings}">Back to bookings</a>
</main>
</body>
</html>
