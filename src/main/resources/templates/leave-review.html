<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Leave a Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">RentalSys</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">How was your stay?</h4>
                    </div>
                    <div class="card-body p-4">
                        <h5 class="text-center mb-4" th:text="${booking.property.title}">Property Title</h5>
                        
                        <form th:action="@{/booking/{id}/review(id=${booking.id})}" th:object="${review}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Rating (1-5)</label>
                                <select class="form-select" th:field="*{rating}" required>
                                    <option value="5">5 - Excellent</option>
                                    <option value="4">4 - Very Good</option>
                                    <option value="3">3 - Average</option>
                                    <option value="2">2 - Poor</option>
                                    <option value="1">1 - Terrible</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Your Review</label>
                                <textarea class="form-control" th:field="*{comment}" rows="4" placeholder="Tell future tenants about your experience..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Submit Review</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
