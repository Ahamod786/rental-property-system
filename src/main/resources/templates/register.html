<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-page">
<main class="auth-card auth-card-wide">
    <h1 class="h3 mb-3">Create Account</h1>
    <div th:replace="~{fragments/messages :: flash}"></div>
    <form th:action="@{/register}" th:object="${user}" method="post" class="row g-3">
        <div class="col-md-6">
            <label class="form-label" for="name">Name</label>
            <input class="form-control" id="name" th:field="*{name}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="phone">Phone</label>
            <input class="form-control" id="phone" th:field="*{phone}">
        </div>
        <div class="col-md-6">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" th:field="*{email}" type="email" required>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" th:field="*{password}" type="password" required>
        </div>
        <div class="col-12">
            <label class="form-label" for="role">Role</label>
            <select class="form-select" id="role" th:field="*{role}">
                <option value="TENANT">Tenant</option>
                <option value="OWNER">Owner</option>
                <option value="ADMIN">Admin</option>
            </select>
        </div>
        <div class="col-12">
            <button class="btn btn-primary w-100" type="submit">Register</button>
        </div>
    </form>
    <p class="mt-3 mb-0">Already registered? <a th:href="@{/login}">Login</a></p>
</main>
</body>
</html>
