<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-page">
<main class="auth-card">
    <h1 class="h3 mb-3">Login</h1>
    <div th:replace="~{fragments/messages :: flash}"></div>
    <div class="alert alert-success" th:if="${param.registered}">Registration successful. Please login.</div>
    <div class="alert alert-danger" th:if="${param.error}">Invalid email or password.</div>
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" required>
        </div>
        <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Login</button>
    </form>
    <p class="mt-3 mb-0">New here? <a th:href="@{/register}">Create an account</a></p>
</main>
</body>
</html>
