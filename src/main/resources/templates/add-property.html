<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Property</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">RentalSys</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    
                    <li class="nav-item" sec:authorize="hasAuthority('OWNER')"><a class="nav-link" href="/property/new">Add Property</a></li>
                    <li class="nav-item" sec:authorize="hasAuthority('OWNER')"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    
                    <li class="nav-item" sec:authorize="isAnonymous()"><a class="nav-link" href="/login">Login / Register</a></li>
                    
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline m-0 p-0">
                            <button type="submit" class="btn btn-link nav-link border-0 text-decoration-none">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">List a New Property</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <form th:action="@{/property/new}" th:object="${property}" method="post">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Property Title</label>
                                <input type="text" class="form-control" th:field="*{title}" placeholder="e.g., Luxury 2BHK Apartment" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Location</label>
                                <input type="text" class="form-control" th:field="*{location}" placeholder="e.g., Downtown, Sector 4" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Monthly Rent Price (₹)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{rentPrice}" placeholder="1500.00" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold">Save Property</button>
                            
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
