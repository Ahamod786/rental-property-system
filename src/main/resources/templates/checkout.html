<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Secure Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">RentalSys Secure Checkout</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            
            <div class="col-md-4 order-md-2 mb-4">
                <h4 class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-primary">Order Summary</span>
                </h4>
                <ul class="list-group mb-3 shadow-sm">
                    <li class="list-group-item d-flex justify-content-between lh-sm">
                        <div>
                            <h6 class="my-0" th:text="${booking.property.title}">Property Name</h6>
                            <small class="text-muted" th:text="${booking.startDate} + ' to ' + ${booking.endDate}">Dates</small>
                        </div>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <span>Total (INR)</span>
                        <strong th:text="'$' + ${booking.property.rentPrice}">₹0.00</strong>
                    </li>
                </ul>
            </div>

            <div class="col-md-7 order-md-1">
                <div class="card shadow-sm border-0 p-4">
                    <h4 class="mb-3">Payment Details</h4>
                    <hr class="mb-4">
                    
                    <form th:action="@{/checkout/process/{id}(id=${booking.id})}" method="post">
                        
                        <div class="my-3">
                            <div class="form-check">
                                <input id="credit" name="paymentMethod" type="radio" class="form-check-input" value="CARD" checked required>
                                <label class="form-check-label" for="credit">Credit card</label>
                            </div>
                            <div class="form-check">
                                <input id="debit" name="paymentMethod" type="radio" class="form-check-input" value="NET_BANKING" required>
                                <label class="form-check-label" for="debit">Net Banking</label>
                            </div>
                        </div>

                        <div class="row gy-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Name on card</label>
                                <input type="text" class="form-control" placeholder="John Doe" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Credit card number</label>
                                <input type="text" class="form-control" placeholder="xxxx-xxxx-xxxx-xxxx" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Expiration</label>
                                <input type="text" class="form-control" placeholder="MM/YY" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">CVV</label>
                                <input type="text" class="form-control" placeholder="123" required>
                            </div>
                        </div>

                        <hr class="my-4">
                        <button class="w-100 btn btn-success btn-lg fw-bold" type="submit">Pay Now</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
