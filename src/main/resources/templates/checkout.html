<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-page">
<main class="auth-card auth-card-wide">
    <h1 class="h3 mb-3">Mock Payment</h1>
    <div th:replace="~{fragments/messages :: flash}"></div>
    <p class="mb-1"><strong th:text="${booking.property.title}">Property</strong></p>
    <p class="text-muted" th:text="|${booking.startDate} to ${booking.endDate}|">Dates</p>
    <p class="fs-4" th:text="${#numbers.formatCurrency(booking.totalPrice)}">$0</p>
    <form th:action="@{/checkout/{id}(id=${booking.id})}" method="post">
        <label class="form-label" for="paymentMethod">Payment Method</label>
        <select class="form-select mb-3" id="paymentMethod" name="paymentMethod">
            <option value="CARD">Card</option>
            <option value="UPI">UPI</option>
            <option value="NET_BANKING">Net Banking</option>
        </select>
        <button class="btn btn-success w-100" type="submit">Pay Now</button>
    </form>
    <a class="d-inline-block mt-3" th:href="@{/my-bookings}">Back to bookings</a>
</main>
</body>
</html>
