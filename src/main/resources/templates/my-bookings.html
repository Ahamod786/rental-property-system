<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">RentalAI</a>
        <a class="btn btn-outline-light btn-sm" th:href="@{/}">Browse</a>
    </div>
</nav>
<main class="container py-4">
    <div th:replace="~{fragments/messages :: flash}"></div>
    <h1 class="h3 mb-4">My Bookings</h1>
    <div class="table-responsive">
        <table class="table align-middle">
            <thead><tr><th>Property</th><th>Dates</th><th>Total</th><th>Status</th><th></th></tr></thead>
            <tbody>
            <tr th:each="booking : ${bookings}">
                <td>
                    <a th:href="@{/property/{id}(id=${booking.property.id})}" th:text="${booking.property.title}">Property</a>
                </td>
                <td th:text="|${booking.startDate} to ${booking.endDate}|">Dates</td>
                <td th:text="${#numbers.formatCurrency(booking.totalPrice)}">$0</td>
                <td><span class="badge text-bg-info" th:text="${booking.bookingStatus}">PENDING</span></td>
                <td class="text-end">
                    <a th:if="${booking.bookingStatus == 'APPROVED'}" class="btn btn-sm btn-success" th:href="@{/checkout/{id}(id=${booking.id})}">Pay</a>
                    <form th:if="${booking.bookingStatus == 'PENDING' || booking.bookingStatus == 'APPROVED'}" th:action="@{/booking/{id}/cancel(id=${booking.id})}" method="post" class="d-inline">
                        <button class="btn btn-sm btn-outline-danger" type="submit">Cancel</button>
                    </form>
                    <a th:if="${booking.bookingStatus == 'COMPLETED'}" class="btn btn-sm btn-primary" th:href="@{/booking/{id}/review(id=${booking.id})}">Review</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(bookings)}">
                <td colspan="5" class="text-muted">No bookings yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
