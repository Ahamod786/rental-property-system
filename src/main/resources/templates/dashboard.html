<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Owner Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">RentalAI</a>
        <a class="btn btn-primary btn-sm" th:href="@{/property/new}">Add Property</a>
    </div>
</nav>
<main class="container py-4">
    <div th:replace="~{fragments/messages :: flash}"></div>
    <h1 class="h3 mb-4">Owner Dashboard</h1>

    <section class="mb-5">
        <h2 class="h5">My Properties</h2>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead><tr><th>Property</th><th>Location</th><th>Rent</th><th>Status</th><th></th></tr></thead>
                <tbody>
                <tr th:each="property : ${properties}">
                    <td th:text="${property.title}">Title</td>
                    <td th:text="${property.location}">Location</td>
                    <td th:text="${#numbers.formatCurrency(property.rentPrice)}">$0</td>
                    <td><span class="badge text-bg-secondary" th:text="${property.status}">AVAILABLE</span></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/property/{id}(id=${property.id})}">View</a>
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{/property/{id}/edit(id=${property.id})}">Edit</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(properties)}">
                    <td colspan="5" class="text-muted">No properties yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section>
        <h2 class="h5">Booking Requests</h2>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead><tr><th>Property</th><th>Tenant</th><th>Dates</th><th>Total</th><th>Status</th><th></th></tr></thead>
                <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.property.title}">Property</td>
                    <td th:text="${booking.tenant.name}">Tenant</td>
                    <td th:text="|${booking.startDate} to ${booking.endDate}|">Dates</td>
                    <td th:text="${#numbers.formatCurrency(booking.totalPrice)}">$0</td>
                    <td><span class="badge text-bg-info" th:text="${booking.bookingStatus}">PENDING</span></td>
                    <td class="text-end">
                        <form th:if="${booking.bookingStatus == 'PENDING'}" th:action="@{/dashboard/approve/{id}(id=${booking.id})}" method="post" class="d-inline">
                            <button class="btn btn-sm btn-success" type="submit">Approve</button>
                        </form>
                        <form th:if="${booking.bookingStatus == 'PENDING'}" th:action="@{/dashboard/reject/{id}(id=${booking.id})}" method="post" class="d-inline">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Reject</button>
                        </form>
                        <form th:if="${booking.bookingStatus == 'APPROVED'}" th:action="@{/dashboard/complete/{id}(id=${booking.id})}" method="post" class="d-inline">
                            <button class="btn btn-sm btn-primary" type="submit">Complete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="6" class="text-muted">No booking requests yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
